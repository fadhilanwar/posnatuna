<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natuna Grosir</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="container header-content">
            <div class="text-h3 font-bold brand-logo">
                Natuna
            </div>

            <div class="search-bar">
                <select class="search-select text-p12 font-medium">
                    <option>Semua Kategori</option>
                    <option value="makanan">Makanan</option>
                    <option value="minuman">Minuman</option>
                </select>
                <input type="text" placeholder="Cari produk di sini..." class="search-input text-p16 font-regular">
                <button class="search-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>

            <div class="header-right text-p16 font-semibold">
                <a href="#">user_1</a>
                <div class="header-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                        </path>
                    </svg>
                </div>
            </div>

            <div class="header-right" id="hamburger-menu">
                <button class="header-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container main-content">

        <div class="hero-banner">
            <div>
                <h1 class="text-h1 font-bold">BELI 2 GRATIS 1 </h1>
                <p class="text-p18 font-medium hero-badge">Periode 12 - 15 April</p>
            </div>
        </div>

        <div class="category-container">
            <div class="category-item">
                <div class="category-box">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTkhOcYs77uQe6BLkOZ7oL3mx8VxBfW3TjGYQ&s"
                        alt="Kategori Makanan">
                </div>
                <span class="text-p12 font-medium category-text">Makanan</span>
            </div>
            <div class="category-item">
                <div class="category-box">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRet52dN9P5o_hh2zN3sup_8r0sOh6Kf0oR8w&s"
                        alt="Kategori Minuman">
                </div>
                <span class="text-p12 font-medium category-text">Minuman</span>
            </div>
        </div>

        <section>
            <h2 class="text-h4 font-bold section-heading">Rekomendasi Untuk Anda</h2>

            <div class="product-grid">

                <div class="product-card">
                    <div class="product-img-box">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3KCVDPokmiGz03Mensgl5Og9M7c27EeRxag&s"
                            alt="Kecap">
                    </div>
                    <h3 class="product-title text-p16 font-medium">Kecap Manis 520ml</h3>
                    <div>
                        <div class="product-price text-h5 font-bold">Rp 18.500</div>
                        <button class="btn-sm">Beli</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img-box">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQm1LOoVc3WiL9kUXusEBV6Z0xl2iFTHlEEvg&s"
                            alt="Air Mineral">
                    </div>
                    <h3 class="product-title text-p16 font-medium">Air Mineral Botol 600ml</h3>
                    <div>
                        <div class="product-price text-h5 font-bold">Rp 2.000</div>
                        <button class="btn-sm">Beli</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img-box">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1l_9YAH-3fQcQA6iANZ-Ved_Ea2ohC0UFIA&s"
                            alt="Mie Instan">
                    </div>
                    <h3 class="product-title text-p16 font-medium">Mie Goreng Instan</h3>
                    <div>
                        <div class="product-price text-h5 font-bold">Rp 3.000</div>
                        <button class="btn-sm">Beli</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-inner text-p12 font-regular">
            <p>Copyright &copy; 2026 <b>Natuna</b>.</p>
        </div>
    </footer>

</body>

</html>
