    <div class="konten">
        <h1>CRUD DATA</h1>
        <p class="keterangan">Tambahkan Data Pelanggan</p>

    <div class="bungkus-form">
            <form action="../user.html" method="POST">
                
                <div class="grup-input">
                    <label for="nama-toko">Nama Toko/PT/Grosir/Warung</label>
                    <input value="Warung Udin" type="text" id="nama-toko" name="nama-toko" placeholder="Masukkan nama lengkap user" required>
                </div>
                <div class="grup-input">
                    <label for="name">Nama Lengkap</label>
                    <input value="Udin Jamaludin"  type="text" id="name" name="name" placeholder="Masukkan nama lengkap user" required>
                </div>

                <div class="grup-input">
                    <label for="password">Password (opsional)</label>
                    <input value="" type="password" id="password" name="password" placeholder="Masukkan password baru">
                </div>

                <div class="grup-input">
                    <label for="alamat">Alamat</label>
                    <textarea style="font-family: Figtree;" name="alamat" cols="50" rows="5" id="alamat" placeholder="Masukkan alamat lengkap pelanggan" required>Jl. Kenanga, U7 No. 10</textarea>
                </div>


                <div class="aksi-form">
                    <div class="aksi-form-kiri">

                        <button type="submit" class="tombol-simpan">Simpan Data</button>
                        <button type="reset" class="tombol-batal">Clear</button>
                    </div>
                    <div class="aksi-form-kanan">
                        <a class="tombol-batal" href="../user.html">Kembali</a>
                    </div>

                    
                </div>

            </form>
        </div>        

    </div>
