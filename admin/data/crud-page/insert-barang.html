    <div class="konten">
        <h1>INSERT - Data Barang</h1>
        <p class="keterangan">Tambahkan Data Barang</p>

    <div class="bungkus-form">
            <form action="../barang.html" method="POST">
                
                <div class="grup-input">
                    <label>Nama Barang</label>
                    <input type="text"  placeholder="Masukkan nama barang" required>
                </div>
                <div class="grup-input">
                    <label for="name">Kategori</label>
                    <select name="" id="">
                        <option value="">Makanan</option>
                        <option value="">Minuman</option>
                        <option value="">Pembersih Pakaian</option>
                    </select>
                </div>

                <div class="grup-input">
                    <label for="">Harga Supplier (Rp.)</label>
                    <input type="number" id="" name="" placeholder="Masukkan harga dari supplier" required>
                </div>
                <div class="grup-input">
                    <label for="">Harga Jual Satuan (Rp.)</label>
                    <input type="number" id="" name="" placeholder="Masukkan harga jual" required>
                </div>
                <div class="grup-input">
                    <label for="">Stok</label>
                    <input type="number" id="" name="" placeholder="Masukkan stok awal" required>
                </div>

               


                <div class="aksi-form">
                    <div class="aksi-form-kiri">

                        <button type="submit" class="tombol-simpan">Simpan Data</button>
                        <button type="reset" class="tombol-batal">Clear</button>
                    </div>
                    <div class="aksi-form-kanan">
                        <a class="tombol-batal" href="../barang.html">Kembali</a>
                    </div>

                    
                </div>

            </form>
        </div>        

    </div>
